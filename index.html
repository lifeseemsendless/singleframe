<script>
        // 1. List your local video files here
        // Make sure these names match your files exactly (e.g., clip1.mp4, clip2.mp4)
        const videoLibrary = [
            "clip1.mp4",
            "clip2.mp4",
            "clip3.mp4",
            "clip4.mp4"
        ];

        // 2. Pick a random video from the list
        const videoElement = document.getElementById('bg-video');
        const randomVideo = videoLibrary[Math.floor(Math.random() * videoLibrary.length)];
        
        // 3. Set the source
        videoElement.src = randomVideo;

        // 4. Force load and play (helps with some browsers)
        videoElement.load();
        videoElement.play().catch(error => {
            console.log("Autoplay was prevented. High-end browsers require 'muted' to autoplay.");
        });

        // Logic for expanding services (Keep existing)
        function openService(title, desc) {
            document.getElementById('detailTitle').innerText = title;
            document.getElementById('detailDesc').innerText = desc;
            document.getElementById('detailView').style.display = 'flex';
        }

        function closeService() {
            document.getElementById('detailView').style.display = 'none';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeService();
        });
    </script>
